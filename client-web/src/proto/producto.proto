syntax = "proto3";

package com.example.demo.proto;


option java_package = "com.example.demo.model";
option java_outer_classname ="ProductoProtos"; 

message Producto{
    int32 id = 1;
    string nombre = 2;
    double precio = 3;
    int32 stock = 4;
}

message ListaProductos {
    repeated Producto productos = 1;
}