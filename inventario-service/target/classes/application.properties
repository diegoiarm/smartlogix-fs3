spring.application.name=inventario-service
server.port=8081

# === BASE DE DATOS MySQL ===
spring.datasource.url=jdbc:mysql://db-inventario:3306/inventario_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=admin
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# === HikariCP (Pool de conexiones) ===
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# === RESILIENCIA - Circuit Breaker ===
resilience4j.circuitbreaker.instances.dbInventario.sliding-window-size=6
resilience4j.circuitbreaker.instances.dbInventario.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.dbInventario.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.dbInventario.register-health-indicator=true

# === RESILIENCIA - Retry ===
resilience4j.retry.instances.dbInventario.max-attempts=3
resilience4j.retry.instances.dbInventario.wait-duration=1s

# === MONITOREO (Actuator) ===
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics,resilience4j
